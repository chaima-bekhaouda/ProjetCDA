services:
  app:
    build: .
    volumes:
      - ./:/var/www/html:delegated
    depends_on:
      - db
    environment:
      - APP_ENV=development
    networks:
      - booknet

  web:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - booknet

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - booknet

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - booknet

volumes:
  db-data:

networks:
  booknet:
    driver: bridge